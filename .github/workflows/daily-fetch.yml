name: Daily Market Data Fetch

on:
  schedule:
    - cron: '30 20 * * 1-5'  # 8:30pm UTC = 4:30pm ET, weekdays only (after market close)
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests lxml

      - name: Run fetcher
        run: python fetch_breadth.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html history/
          git diff --cached --quiet || git commit -m "Data refresh: $(date -u +%Y-%m-%d)"
          git push
